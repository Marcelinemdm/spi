<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Proposal</title>
  <link rel="shortcut icon" href="/icon.jpg" type="image/x-icon">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{--bg:#f7f6f2;--surface:#fbfbf9;--surface2:#f1efe9;--text:#1f1d19;--muted:#6f6a61;--border:#d6d1c7;--accent:#01696f;--accent2:#0f8b8d;--shadow:0 10px 30px rgba(0,0,0,.08);--radius:18px}
    [data-theme="dark"]{--bg:#11110f;--surface:#181815;--surface2:#23231f;--text:#f3f2ee;--muted:#aca79c;--border:#32322d;--accent:#66c7c9;--accent2:#91e4e5;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:18px}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'General Sans',system-ui,sans-serif} body{min-height:100vh}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:stretch}.panel{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero-card{padding:28px}.eyebrow{color:var(--accent2);text-transform:uppercase;letter-spacing:.12em;font-size:12px}h1{margin:10px 0 8px;font-size:clamp(2rem,4vw,4rem);line-height:1}.sub{color:var(--muted);max-width:58ch}.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.chip{padding:10px 14px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.03);color:var(--muted)}
    .player{padding:20px;display:flex;flex-direction:column;justify-content:space-between}.now{color:var(--muted);font-size:14px;margin-bottom:8px}.title{font-size:clamp(1.1rem,2vw,1.8rem);font-weight:700}.filename{color:var(--muted);font-size:14px;margin-top:6px;word-break:break-word}audio{width:100%;margin-top:18px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:12px 14px;border-radius:12px;cursor:pointer;font:inherit}.primary{background:var(--accent);color:#fff;border-color:transparent}
    .search{margin:20px 0}.search input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.track{padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;cursor:pointer;transition:.18s ease}.track:hover{transform:translateY(-1px);border-color:var(--accent)}
    .n{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:rgba(127,127,127,.12);color:var(--muted);font-size:14px}.meta{min-width:0}.meta .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta .file{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.play{color:var(--accent2);font-weight:700}.footer{color:var(--muted);font-size:13px;margin-top:18px}.hidden{display:none!important}.status{margin-top:12px;color:var(--muted);font-size:14px}
    @media (max-width:900px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.wrap{padding:14px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="panel hero-card">
      <div class="eyebrow">Player local</div>
      <h1>Músicas em <code>seusomelier</code></h1>
      <p class="sub">Esta versão tenta detectar automaticamente os arquivos dentro de <code>spi</code>.</p>
      <div class="stats">
        <div class="chip" id="countChip">0 faixas</div>
        <div class="chip">Detecção automática</div>
        <div class="chip">MP3, M4A, OGG, WAV, FLAC</div>
      </div>
      <div class="status" id="status">Tentando carregar...</div>
    </div>
    <div class="panel player">
      <div>
        <div class="now">Tocando agora</div>
        <div class="title" id="currentTitle">Selecione uma música</div>
        <div class="filename" id="currentFile"></div>
        <audio id="audio" controls preload="metadata"></audio>
      </div>
      <div class="toolbar">
        <button id="prevBtn">Anterior</button>
        <button class="primary" id="playFirstBtn">Tocar primeira</button>
        <button id="nextBtn">Próxima</button>
        <button id="reloadBtn">Recarregar lista</button>
        <button id="themeBtn">Alternar tema</button>
      </div>
    </div>
  </section>

  <div class="search">
    <input id="search" type="search" placeholder="Buscar por nome do arquivo ou música...">
  </div>

  <section class="grid" id="trackList"></section>
</div>
<script>
const audio = document.getElementById('audio');
const currentTitle = document.getElementById('currentTitle');
const currentFile = document.getElementById('currentFile');
const search = document.getElementById('search');
const trackList = document.getElementById('trackList');
const statusEl = document.getElementById('status');
const countChip = document.getElementById('countChip');
let tracks = [];
let currentIndex = -1;
const exts = ['.mp3','.m4a','.aac','.ogg','.wav','.flac','.opus','.webm'];

function setTheme(){
  const root = document.documentElement;
  root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function decodeName(name){
  try { return decodeURIComponent(name); } catch { return name; }
}

function titleFromFile(file){
  return decodeName(file).replace(/^.*\//,'').replace(/\.[^.]+$/,'');
}

function isAudioFile(name){
  const low = name.toLowerCase();
  return exts.some(ext => low.endsWith(ext));
}

async function loadFromJson(){
  const res = await fetch('./song/index.json', {cache:'no-store'});
  if(!res.ok) throw new Error('index.json não encontrado');
  const data = await res.json();
  const files = Array.isArray(data) ? data : (data.files || []);
  return files.filter(isAudioFile).map(file => ({title:titleFromFile(file), file:file.startsWith('song/') ? './'+file : './song/' + file.replace(/^\.\/?song\//,'')}));
}

async function loadFromDirectoryIndex(){
  const res = await fetch('./song/', {cache:'no-store'});
  if(!res.ok) throw new Error('listagem da pasta indisponível');
  const text = await res.text();
  const doc = new DOMParser().parseFromString(text, 'text/html');
  const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
  const files = hrefs.filter(Boolean).filter(h => !h.endsWith('/')).map(h => h.replace(/^\.?\//,''));
  const audioFiles = files.filter(isAudioFile);
  return audioFiles.map(file => ({title:titleFromFile(file), file:file.startsWith('song/') ? './'+file : './song/' + file}));
}

function render(){
  trackList.innerHTML = '';
  tracks.forEach((t, i) => {
    const article = document.createElement('article');
    article.className = 'panel track';
    article.dataset.index = i;
    article.dataset.search = (t.title + ' ' + t.file).toLowerCase();
    article.innerHTML = `<div class="n">${i+1}</div><div class="meta"><div class="name"></div><div class="file"></div></div><div class="play">Play</div>`;
    article.querySelector('.name').textContent = t.title;
    article.querySelector('.file').textContent = t.file;
    article.addEventListener('click', ()=> playTrack(i));
    trackList.appendChild(article);
  });
  countChip.textContent = `${tracks.length} faixas`;
}

function highlight(index){
  [...document.querySelectorAll('.track')].forEach((c,i)=>{
    c.style.outline = i===index ? '2px solid var(--accent)' : 'none';
    c.style.transform = i===index ? 'translateY(-1px)' : '';
  });
}

function playTrack(index){
  if(index < 0 || index >= tracks.length) return;
  currentIndex = index;
  const t = tracks[index];
  audio.src = t.file;
  currentTitle.textContent = t.title;
  currentFile.textContent = t.file;
  highlight(index);
  audio.play().catch(()=>{});
}

async function loadTracks(){
  statusEl.textContent = 'Tentando ler...';
  try {
    tracks = await loadFromJson();
    if(!tracks.length) throw new Error('index.json vazio');
    statusEl.textContent = 'Lista carregada';
    render();
    return;
  } catch (e) {}

  statusEl.textContent = 'Tentando ler a listagem de ./song/...';
  try {
    tracks = await loadFromDirectoryIndex();
    if(!tracks.length) throw new Error('nenhum áudio encontrado');
    statusEl.textContent = 'Lista carregada pela indexação';
    render();
    return;
  } catch (e) {
    tracks = [];
    render();
    statusEl.textContent = 'Não foi possível detectar automaticamente. Habilite a listagem da pasta /song ou crie /song/index.json';
  }
}

document.getElementById('playFirstBtn').addEventListener('click', ()=> playTrack(0));
document.getElementById('prevBtn').addEventListener('click', ()=> playTrack(currentIndex <= 0 ? tracks.length - 1 : currentIndex - 1));
document.getElementById('nextBtn').addEventListener('click', ()=> playTrack(currentIndex >= tracks.length - 1 ? 0 : currentIndex + 1));
document.getElementById('reloadBtn').addEventListener('click', loadTracks);
document.getElementById('themeBtn').addEventListener('click', setTheme);
audio.addEventListener('ended', ()=> playTrack(currentIndex >= tracks.length - 1 ? 0 : currentIndex + 1));
search.addEventListener('input', (e)=>{
  const q = e.target.value.toLowerCase().trim();
  [...document.querySelectorAll('.track')].forEach(card => card.classList.toggle('hidden', q && !card.dataset.search.includes(q)));
});
loadTracks();
</script>
</body>
</html>
